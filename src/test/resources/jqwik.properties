# jqwik configuration
# See: https://jqwik.net/docs/current/user-guide.html#jqwik-configuration

database                    = .jqwik-database
# Default number of tries per @Property (students can override per-method)
tries                       = 1000
maxDiscardRatio             = 5
defaultSeed                 = -1
reportOnlyFailures          = false
